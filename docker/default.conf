server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # The whole blog sits behind basic auth; credentials come from
    # AUTH_USER / AUTH_PASSWORD env vars (see docker/30-htpasswd.sh).
    auth_basic "Hiep Lam Rides";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Unauthenticated healthcheck endpoint for Docker/Dokploy probes.
    location = /healthz {
        auth_basic off;
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /images/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /pagefind/ {
        expires 1h;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain application/xml application/rss+xml;
}
