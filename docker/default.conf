server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Optional basic-auth gate: docker/30-htpasswd.sh writes this file at
    # container start. Empty (public site) unless AUTH_PASSWORD is set.
    include /etc/nginx/auth-gate.conf;

    # Unauthenticated healthcheck endpoint for Docker/Dokploy probes.
    location = /healthz {
        auth_basic off;
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /images/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /pagefind/ {
        expires 1h;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain application/xml application/rss+xml;
}
