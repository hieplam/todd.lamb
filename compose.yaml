services:
  app:
    image: oven/bun:1
    ports:
      - 4321:4321
    working_dir: /app
    command: >
      sh -c "
      bun install --frozen-lockfile
      && bun run dev --host 0.0.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - ./:/app
      - /app/node_modules
